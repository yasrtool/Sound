{q:"What is pharmacognosy primarily defined as?",o:["Study of synthetic drugs","Study of natural substances mainly plants used in medicine","Study of bacterial infections","Study of human physiology"],a:1,en:"Pharmacognosy is the study of those natural substances, principally plants, that find use in medicine.",ar:"\u0639\u0644\u0645 \u0627\u0644\u0639\u0642\u0627\u0642\u064a\u0631 \u0647\u0648 \u062f\u0631\u0627\u0633\u0629 \u0627\u0644\u0645\u0648\u0627\u062f \u0627\u0644\u0637\u0628\u064a\u0639\u064a\u0629\u060c \u0648\u0628\u0635\u0648\u0631\u0629 \u0631\u0626\u064a\u0633\u064a\u0629 \u0627\u0644\u0646\u0628\u0627\u062a\u0627\u062a\u060c \u0627\u0644\u062a\u064a \u062a\u064f\u0633\u062a\u062e\u062f\u0645 \u0641\u064a \u0627\u0644\u0637\u0628."},

    d.id='d'+i; d.textContent=i+1;
    (function(x){d.onclick=function(){ci=x;renderQ();};})(i);
    n.appendChild(d);
  }
}

function updateNav(){

  }
}

function renderQ(){
  var q=Q[ci];

  document.getElementById('pf').style.width=((ci+1)/T*100)+'%';
  var L=['A','B','C','D'];

    return '<div class="opt'+(an[ci]===i?' sel':'')+'" onclick="pick('+i+')">'

    +'<div class="opts">'+h+'</div>';

  document.getElementById('bn').style.display=ci===T-1?'none':'';
  document.getElementById('bs').style.display=ci===T-1?'':'none';
  updateNav();
}

function pick(i){an[ci]=i;renderQ();}
function mv(d){ci=Math.max(0,Math.min(T-1,ci+d));renderQ();}

{q:"Modern techniques in chemical taxonomy span the last:",o:["25 years","50 years","75 years","100 years"],a:2,en:"In the last 75 years modern isolation techniques have led to chemical screening of thousands of plants.",ar:"\u0641\u064a \u0627\u0644\u0633\u0646\u0648\u0627\u062a \u0627\u0644\u0640 75 \u0627\u0644\u0623\u062e\u064a\u0631\u0629\u060c \u0623\u062f\u062a \u062a\u0642\u0646\u064a\u0627\u062a \u0627\u0644\u0639\u0632\u0644 \u0625\u0644\u0649 \u0641\u062d\u0635 \u0643\u064a\u0645\u064a\u0627\u0626\u064a \u0644\u0622\u0644\u0627\u0641 \u0627\u0644\u0646\u0628\u0627\u062a\u0627\u062a."},
{q:"In chemical taxonomy useful characters are chemicals with:",o:["Universal distribution","Intermediate distribution not all not one","Restriction to one species","Synthetic origin"],a:1,en:"Characters used should have intermediate distribution neither in all plants nor restricted to one.",ar:"\u064a\u062c\u0628 \u0623\u0646 \u062a\u062a\u0645\u062a\u0639 \u0627\u0644\u0645\u0648\u0627\u062f \u0628\u062a\u0648\u0632\u064a\u0639 \u0645\u062a\u0648\u0633\u0637 \u0641\u064a \u0627\u0644\u0645\u0645\u0644\u0643\u0629 \u0627\u0644\u0646\u0628\u0627\u062a\u064a\u0629."},
{q:"Why are essential amino acids not useful in chemical taxonomy?",o:["They are toxic","They are found in almost all plants","They are too expensive","They decompose rapidly"],a:1,en:"Essential amino acids are found in almost all plants so they lack the intermediate distribution needed.",ar:"\u0627\u0644\u0623\u062d\u0645\u0627\u0636 \u0627\u0644\u0623\u0645\u064a\u0646\u064a\u0629 \u0627\u0644\u0623\u0633\u0627\u0633\u064a\u0629 \u062a\u0648\u062c\u062f \u0641\u064a \u0643\u0644 \u0627\u0644\u0646\u0628\u0627\u062a\u0627\u062a \u062a\u0642\u0631\u064a\u0628\u0627 \u0641\u0644\u0627 \u062a\u0635\u0644\u062d \u0644\u0644\u062a\u0635\u0646\u064a\u0641."},
{q:"The alkaloid coniine is found only in:",o:["Papaver somniferum","Digitalis purpurea","Conium maculatum","Mentha piperita"],a:2,en:"Coniine is found only in Conium maculatum.",ar:"\u064a\u0648\u062c\u062f \u0627\u0644\u0642\u0644\u0648\u064a\u062f \u0643\u0648\u0646\u064a\u064a\u0646 \u0641\u0642\u0637 \u0641\u064a Conium maculatum."},
{q:"Conium maculatum belongs to the family:",o:["Solanaceae","Papaveraceae","Umbelliferae","Labiateae"],a:2,en:"Conium maculatum belongs to the family Umbelliferae.",ar:"\u064a\u0646\u062a\u0645\u064a \u0627\u0644\u0643\u0648\u0646\u064a\u0648\u0645 \u0625\u0644\u0649 \u0627\u0644\u0639\u0627\u0626\u0644\u0629 \u0627\u0644\u062e\u064a\u0645\u064a\u0629 Umbelliferae."},
{q:"Scientists in chemical taxonomy mainly study:",o:["Primary metabolites","Secondary metabolites alkaloids flavonoids glycosides","Essential amino acids","Common sugars"],a:1,en:"Scientists mainly study secondary metabolites such as alkaloids, flavonoids, and glycosides.",ar:"\u064a\u062f\u0631\u0633 \u0627\u0644\u0639\u0644\u0645\u0627\u0621 \u0628\u0635\u0648\u0631\u0629 \u0631\u0626\u064a\u0633\u064a\u0629 \u0627\u0644\u0645\u0633\u062a\u0642\u0644\u0628\u0627\u062a \u0627\u0644\u062b\u0627\u0646\u0648\u064a\u0629 \u0643\u0627\u0644\u0642\u0644\u0648\u064a\u062f\u0627\u062a \u0648\u0627\u0644\u0641\u0644\u0627\u0641\u0648\u0646\u0648\u064a\u062f\u0627\u062a."},
{q:"Modern chemical taxonomy also uses:",o:["Fossil records","DNA characteristics and specific proteins","Physical weight","Morphological shape only"],a:1,en:"Recently chemical taxonomy uses molecular characters such as DNA, specific proteins, and amino acid sequences.",ar:"\u064a\u0633\u062a\u062e\u062f\u0645 \u0627\u0644\u062a\u0635\u0646\u064a\u0641 \u0627\u0644\u062d\u062f\u064a\u062b \u062e\u0635\u0627\u0626\u0635 \u0627\u0644\u062d\u0645\u0636 \u0627\u0644\u0646\u0648\u0648\u064a \u0648\u0627\u0644\u0628\u0631\u0648\u062a\u064a\u0646\u0627\u062a."},
{q:"The majority of medicinal plants are derived from:",o:["Gymnospermae","Algae","Spermatophyta","Bryophyta"],a:2,en:"The majority of medicinal plants are derived from Spermatophyta.",ar:"\u062a\u0634\u062a\u0642 \u063a\u0627\u0644\u0628\u064a\u0629 \u0627\u0644\u0646\u0628\u0627\u062a\u0627\u062a \u0627\u0644\u062f\u0648\u0627\u0626\u064a\u0629 \u0645\u0646 \u0627\u0644\u0628\u0630\u0631\u064a\u0627\u062a Spermatophyta."},
{q:"Gymnospermae yields which useful products?",o:["Tannins and glycosides","Oils resins and the alkaloid ephedrine","Marine polysaccharides","Antibiotic compounds"],a:1,en:"Gymnospermae yields some useful oils, resins, and the alkaloid ephedrine.",ar:"\u062a\u0646\u062a\u062c \u0639\u0627\u0631\u064a\u0627\u062a \u0627\u0644\u0628\u0630\u0648\u0631 \u0632\u064a\u0648\u062a\u0627 \u0648\u0631\u0627\u062a\u0646\u062c\u0627\u062a \u0648\u0627\u0644\u0642\u0644\u0648\u064a\u062f \u0627\u0644\u0625\u064a\u0641\u064a\u062f\u0631\u064a\u0646."},
{q:"Angiospermae is divided into:",o:["Gymnospermae and Pteridophyta","Monocotyledons and Dicotyledons","Algae and Fungi","Ferns and Mosses"],a:1,en:"Angiospermae is divided into monocotyledons and dicotyledons.",ar:"\u062a\u0646\u0642\u0633\u0645 \u0643\u0627\u0633\u064a\u0627\u062a \u0627\u0644\u0628\u0630\u0648\u0631 \u0625\u0644\u0649 \u0623\u062d\u0627\u062f\u064a\u0627\u062a \u0648\u062b\u0646\u0627\u0626\u064a\u0627\u062a \u0627\u0644\u0641\u0644\u0642\u0629."},
{q:"Which group of Angiospermae provides more useful drugs?",o:["Monocotyledons","Dicotyledons","Both equally","Neither"],a:1,en:"Both provide useful drugs but especially the dicotyledons.",ar:"\u062a\u0646\u062a\u062c \u0643\u0644\u062a\u0627\u0647\u0645\u0627 \u0623\u062f\u0648\u064a\u0629\u060c \u0644\u0643\u0646 \u062b\u0646\u0627\u0626\u064a\u0627\u062a \u0627\u0644\u0641\u0644\u0642\u0629 \u0647\u064a \u0627\u0644\u0623\u0643\u062b\u0631."},
{q:"Fungi are especially important in pharmacy for:",o:["Volatile oils","Antibiotics","Vitamins","Marine polysaccharides"],a:1,en:"The fungi provide a number of useful drugs especially antibiotics.",ar:"\u062a\u0648\u0641\u0631 \u0627\u0644\u0641\u0637\u0631\u064a\u0627\u062a \u0623\u062f\u0648\u064a\u0629 \u0645\u0641\u064a\u062f\u0629\u060c \u0648\u062e\u0627\u0635\u0629 \u0627\u0644\u0645\u0636\u0627\u062f\u0627\u062a \u0627\u0644\u062d\u064a\u0648\u064a\u0629."},
{q:"Algae provide which substances?",o:["Ephedrine","Digitoxin","Agar","Gelatin"],a:2,en:"Algae are a source of limited substances such as agar and alginic acid.",ar:"\u0627\u0644\u0637\u062d\u0627\u0644\u0628 \u0645\u0635\u062f\u0631 \u0644\u0639\u062f\u062f \u0645\u062d\u062f\u0648\u062f \u0645\u0646 \u0627\u0644\u0645\u0648\u0627\u062f \u0645\u062b\u0644 \u0627\u0644\u0623\u062c\u0627\u0631 \u0648\u062d\u0645\u0636 \u0627\u0644\u0623\u0644\u062c\u064a\u0646\u064a\u0643."},
{q:"Lichens and mosses contribute to medicine:",o:["Significantly","As main antibiotic source","Very little","As primary alkaloid source"],a:2,en:"Lichens and mosses contribute little to medicine.",ar:"\u062a\u0633\u0647\u0645 \u0627\u0644\u0623\u0634\u0646\u0627\u062a \u0648\u0627\u0644\u0637\u062d\u0627\u0644\u0628 \u0642\u0644\u064a\u0644\u0627 \u0641\u064a \u0627\u0644\u0637\u0628."},
{q:"Which traditional material is provided by land animals?",o:["Agar","Ephedrine","Gelatin","Coniine"],a:2,en:"Land animals provide traditional pharmaceutical materials such as gelatin, wool fat, and beeswax.",ar:"\u062a\u0648\u0641\u0631 \u0627\u0644\u062d\u064a\u0648\u0627\u0646\u0627\u062a \u0627\u0644\u0628\u0631\u064a\u0629 \u0645\u0648\u0627\u062f \u0635\u064a\u062f\u0644\u0627\u0646\u064a\u0629 \u062a\u0642\u0644\u064a\u062f\u064a\u0629 \u0645\u062b\u0644 \u0627\u0644\u062c\u064a\u0644\u0627\u062a\u064a\u0646."},
{q:"Land animals are a source of:",o:["Antibiotics and agar","Hormones vitamins and sera","Volatile oils","Tannins and glycosides"],a:1,en:"Land animals are a source of hormones, vitamins, and sera.",ar:"\u0627\u0644\u062d\u064a\u0648\u0627\u0646\u0627\u062a \u0627\u0644\u0628\u0631\u064a\u0629 \u0645\u0635\u062f\u0631 \u0644\u0644\u0647\u0631\u0645\u0648\u0646\u0627\u062a \u0648\u0627\u0644\u0641\u064a\u062a\u0627\u0645\u064a\u0646\u0627\u062a \u0648\u0627\u0644\u0623\u0645\u0635\u0627\u0644."},
{q:"Bacteria are used as a source for:",o:["Volatile oils","Production of antibiotics and genetic engineering","Producing tannins","Raw vegetable drugs"],a:1,en:"Bacteriophyta is a source for antibiotics and is employed in genetic engineering.",ar:"\u0627\u0644\u0628\u0643\u062a\u064a\u0631\u064a\u0627 \u0645\u0635\u062f\u0631 \u0644\u0625\u0646\u062a\u0627\u062c \u0627\u0644\u0645\u0636\u0627\u062f\u0627\u062a \u0627\u0644\u062d\u064a\u0648\u064a\u0629 \u0648\u0627\u0644\u0647\u0646\u062f\u0633\u0629 \u0627\u0644\u0648\u0631\u0627\u062b\u064a\u0629."},
{q:"Which product is made via genetic engineering using bacteria?",o:["Penicillin","Human insulin","Digitoxin","Morphine"],a:1,en:"Bacteria are employed in genetic engineering for the production of human insulin.",ar:"\u062a\u0633\u062a\u062e\u062f\u0645 \u0627\u0644\u0628\u0643\u062a\u064a\u0631\u064a\u0627 \u0641\u064a \u0627\u0644\u0647\u0646\u062f\u0633\u0629 \u0627\u0644\u0648\u0631\u0627\u062b\u064a\u0629 \u0644\u0625\u0646\u062a\u0627\u062c \u0627\u0644\u0625\u0646\u0633\u0648\u0644\u064a\u0646 \u0627\u0644\u0628\u0634\u0631\u064a."},
{q:"The European Pharmacopeia is abbreviated as:",o:["B.P.","U.S.P.","U.P.","N.F."],a:2,en:"The European Pharmacopeia is abbreviated as U.P.",ar:"\u0627\u0644\u0641\u0627\u0631\u0645\u0627\u0643\u0648\u0628\u064a\u0627 \u0627\u0644\u0623\u0648\u0631\u0648\u0628\u064a\u0629 \u062a\u062e\u062a\u0635\u0631 \u0628\u0640 U.P."},
{q:"The National Formulary is abbreviated as:",o:["N.F.","N.P.","U.P.","G.F."],a:0,en:"The National Formulary is abbreviated as N.F.",ar:"\u0627\u0644\u0635\u064a\u063a\u0629 \u0627\u0644\u0648\u0637\u0646\u064a\u0629 \u062a\u062e\u062a\u0635\u0631 \u0628\u0640 N.F."},
{q:"Salix is described as a:",o:["Shrub","Herb","Tree","Marine plant"],a:2,en:"Salix is described as a Tree.",ar:"\u0648\u0635\u0641 \u0627\u0644\u0635\u0641\u0635\u0627\u0641 Salix \u0628\u0623\u0646\u0647 \u0634\u062c\u0631\u0629."},
{q:"Which plant is an example of a shrub?",o:["Salix","Catharanthus","Digitalis","Mentha"],a:1,en:"Catharanthus is given as an example of a shrub.",ar:"\u0627\u0644\u0643\u0627\u062b\u0627\u0631\u0627\u0646\u062b\u0648\u0633 \u0645\u062b\u0627\u0644 \u0639\u0644\u0649 \u0627\u0644\u0634\u062c\u064a\u0631\u0627\u062a."}
];

var T=Q.length,ci=0,an=new Array(T).fill(-1),sn="",sc=90*60,ti=null;

function goStart(){
  var v=document.getElementById('nm').value.trim();
  var p=v.split(/\s+/).filter(function(x){return x.length>0;});
  var c=document.getElementById('tg').checked;
  var e=document.getElementById('em');
  if(p.length<3||!c){e.style.display='block';return;}
  e.style.display='none';
  sn=v; showScreen('qz'); buildNav(); renderQ(); startTimer();
}

function showScreen(id){
  ['lg','qz','rs'].forEach(function(s){
    var el=document.getElementById(s);
    el.classList.remove('on');
  });
  document.getElementById(id).classList.add('on');
}

function buildNav(){
  var n=document.getElementById('nav'); n.innerHTML='';
  for(var i=0;i<T;i++){
    var d=document.createElement('div');
    d.className='dot'+(i===ci?' cur':'');
    d.id='d'+i; d.textContent=i+1;
    (function(x){d.onclick=function(){ci=x;renderQ();};})(i);
    n.appendChild(d);
  }
}

function updateNav(){
  for(var i=0;i<T;i++){
    var d=document.getElementById('d'+i);
    if(d) d.className='dot'+(an[i]!==-1?' done':'')+(i===ci?' cur':'');
  }
}

function renderQ(){
  var q=Q[ci];
  document.getElementById('qc').textContent='Q '+(ci+1)+' / '+T;
  document.getElementById('pf').style.width=((ci+1)/T*100)+'%';
  var L=['A','B','C','D'];
  var h=q.o.map(function(o,i){
    return '<div class="opt'+(an[ci]===i?' sel':'')+'" onclick="pick('+i+')">'
      +'<div class="ol">'+L[i]+'</div><div class="ot">'+o+'</div></div>';
  }).join('');
  document.getElementById('qcard').innerHTML=
    '<div class="qn">Question '+(ci+1)+' of '+T+'</div>'
    +'<div class="qt">'+q.q+'</div>'
    +'<div class="opts">'+h+'</div>';
  document.getElementById('bp').style.display=ci===0?'none':'';
  document.getElementById('bn').style.display=ci===T-1?'none':'';
  document.getElementById('bs').style.display=ci===T-1?'':'none';
  updateNav();
}

function pick(i){an[ci]=i;renderQ();}
function mv(d){ci=Math.max(0,Math.min(T-1,ci+d));renderQ();}

function submit(){
  var u=an.filter(function(x){return x===-1;}).length;
  if(u>0&&!confirm(u+' question(s) unanswered. Submit anyway?'))return;
  clearInterval(ti); showResults();
}

function startTimer(){
  ti=setInterval(function(){
    sc--;
    var m=Math.floor(sc/60),s=sc%60;
    var el=document.getElementById('tm');
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(sc<=300)el.classList.add('red');
    if(sc<=0){clearInterval(ti);showResults();}
  },1000);
}

function showResults(){
  var c=0,w=0,sk=0;
  Q.forEach(function(q,i){
    if(an[i]===-1)sk++;
    else if(an[i]===q.a)c++;
    else w++;
  });
  var pct=Math.round(c/T*100);
  document.getElementById('rn').textContent=sn;
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('ro').textContent=c+'/'+T;
  document.getElementById('rc').textContent=c;
  document.getElementById('rw').textContent=w;
  document.getElementById('rsk').textContent=sk;
  var g,col;
  if(pct>=90){g='\u0645\u0645\u062a\u0627\u0632 Excellent';col='#2d6a4f';}
  else if(pct>=80){g='\u062c\u064a\u062f \u062c\u062f\u0627 Very Good';col='#40916c';}
  else if(pct>=70){g='\u062c\u064a\u062f Good';col='#52b788';}
  else if(pct>=60){g='\u0645\u0642\u0628\u0648\u0644 Pass';col='#c8973a';}
  else{g='\u0631\u0627\u0633\u0628 Fail';col='#c0392b';}
  var gb=document.getElementById('gb');
  gb.textContent=g;gb.style.background=col+'22';gb.style.color=col;gb.style.border='1px solid '+col+'55';
  var rl=document.getElementById('rl'); rl.innerHTML='';
  var L=['A','B','C','D'];
  Q.forEach(function(q,i){
    if(an[i]===q.a||an[i]===-1)return;
    var dv=document.createElement('div'); dv.className='ri';
    dv.innerHTML='<div class="riq"><span>Q'+(i+1)+'</span>'+q.q+'</div>'
      +'<div class="ria">'
      +'<div class="ra w"><span style="color:#e74c3c">\u2717</span>'
      +'<span class="rla" style="color:#e74c3c">\u0625\u062c\u0627\u0628\u062a\u0643:</span>'
      +'<span>'+L[an[i]]+'. '+q.o[an[i]]+'</span></div>'
      +'<div class="ra c"><span style="color:#40916c">\u2713</span>'
      +'<span class="rla" style="color:#40916c">\u0627\u0644\u0635\u062d\u064a\u062d:</span>'
      +'<span>'+L[q.a]+'. '+q.o[q.a]+'</span></div>'
      +'</div>'
      +'<div class="rexp">'
      +'<div class="een">&#128218; '+q.en+'</div>'
      +'<div class="ear">&#128218; '+q.ar+'</div>'
      +'</div>';
    rl.appendChild(dv);
  });
  if(!rl.innerHTML)rl.innerHTML='<div style="text-align:center;color:#52b788;padding:20px;font-size:16px;">&#127881; \u0644\u0627 \u062a\u0648\u062c\u062f \u0623\u062e\u0637\u0627\u0621 - Perfect Score!</div>';
  showScreen('rs');
}

</script>
